# driftwm — personal config (symlink to ~/.config/driftwm/config.toml)

autostart = [
    # gnome-keyring is started+unlocked by PAM (pam_gnome_keyring auto_start in
    # /etc/pam.d/gdm-password and gdm-autologin) with the secrets component only;
    # driftwm-session imports the PAM env into systemd/D-Bus before driftwm
    # launches. This line attaches the ssh component to the already-unlocked
    # daemon and propagates SSH_AUTH_SOCK (PAM doesn't set it for ssh-only).
    "eval $(gnome-keyring-daemon --start --components=ssh) && systemctl --user import-environment SSH_AUTH_SOCK && dbus-update-activation-environment SSH_AUTH_SOCK",
    "/usr/libexec/polkit-gnome-authentication-agent-1",
    "swayosd-server --top-margin 0.95",
    "swaync",
     "waybar -c ~/.config/waybar/taskbar.jsonc -s ~/.config/waybar/taskbar.css",
     "sleep 1 && waybar -c ~/.config/waybar/tray.jsonc -s ~/.config/waybar/tray.css",
     "vorta -d",
     "~/Documents/work/scripts/driftwm/extras/widgets/launch.sh",
     "~/Documents/work/scripts/driftwm/extras/scripts/battery_notify.sh",
     "~/Documents/work/scripts/driftwm/extras/scripts/theme-watch.sh",
     "swayidle -w timeout 300 'brightnessctl -s set 10%' resume 'brightnessctl -r' timeout 330 '~/Documents/work/scripts/driftwm/extras/scripts/lock.sh' timeout 600 'systemctl suspend' before-sleep '~/Documents/work/scripts/driftwm/extras/scripts/lock.sh'",
     "sway-audio-idle-inhibit",
]

focus_follows_mouse = true
window_placement = "auto"

[env]
QT_QPA_PLATFORMTHEME = "qt6ct"

[snap]
corners = true
centers = true

[input.keyboard]
layout = "us,ru"
options = "grp:caps_toggle,grp_led:caps,altwin:ctrl_alt_win"

[zoom]
reset_on_new_window = false

[cursor]
theme = "elementary"

[decorations]
bg_color = "#FDF6E3"
fg_color = "#5C6A72"

[background]
type = "shader"
path = "/usr/local/share/driftwm/wallpapers/static/pink_cloud.glsl"

[output.outline]
color="#FDF6E3"

[mouse]
decoration_resize_snapped = true
decoration_fit_snapped = true

[keybindings]
"mod+return" = "exec ptyxis -s"
"mod+d" = "exec fuzzel"
"mod+shift+d" = "spawn ~/Documents/work/scripts/driftwm/extras/scripts/theme-toggle.sh"
"mod+l" = "spawn ~/Documents/work/scripts/driftwm/extras/scripts/lock.sh"
"mod+n" = "spawn swaync-client -t"
# swayosd instead of default wpctl/brightnessctl
"XF86AudioRaiseVolume" = "spawn swayosd-client --output-volume raise"
"XF86AudioLowerVolume" = "spawn swayosd-client --output-volume lower"
"XF86AudioMute" = "spawn swayosd-client --output-volume mute-toggle"
"XF86MonBrightnessUp" = "spawn swayosd-client --brightness raise"
"XF86MonBrightnessDown" = "spawn swayosd-client --brightness lower"
"mod+s" = "exec ~/Documents/work/scripts/driftwm/extras/scripts/window-search.sh"
"mod+m" = "fit-window-snapped"
"mod+shift+m" = "fit-window"

[gestures.on-window]
"alt+3-finger-swipe" = "resize-window-snapped"
"alt+shift+3-finger-swipe" = "resize-window"

[mouse.on-window]
"alt+middle" = "fill-window"

[[outputs]]
name = "HDMI-A-1"
transform = "90"

[effects]
blur_radius = 3

# Dashboard widgets — positioned around origin for home view (1920x1080)

# Shared defaults for all drift-* widgets (sticky-on flags, last-wins scalars)
[[window_rules]]
app_id = "drift-*"
widget = true
decoration = "none"

[[window_rules]]
app_id = "drift-clock"
position = [-93, 205]

[[window_rules]]
app_id = "drift-stats"
position = [-93, 0]

[[window_rules]]
app_id = "drift-canvas"
position = [-129, -185]

[[window_rules]]
app_id = "drift-layout"
position = [42, -185]

[[window_rules]]
app_id = "drift-calendar"
position = [186, 0]

[[window_rules]]
app_id = "drift-weather"
position = [186, 205]

[[window_rules]]
app_id = "drift-notif"
position = [190, -185]

[[window_rules]]
app_id = "drift-power"
position = [274, -259]

[[window_rules]]
app_id = "drift-power-menu"
position = [274, -370]
decoration = "server"

# Waybar: layer-shell uses match_window_rule_nth (Nth instance → Nth rule
# with `position`), so these must stay as separate fully-specified rules.
[[window_rules]]
app_id = "waybar"
position = [-289, 21]
widget = true
decoration = "none"

[[window_rules]]
app_id = "waybar"
position = [126, -259]
widget = true
decoration = "none"

# Cosmic settings: hide winit window helper and apply fixed window size
[[window_rules]]
title = "winit window"
widget = true

[[window_rules]]
app_id = "com.system76.CosmicSettings"
size=[500, 725]

# Server side decoration
[[window_rules]]
app_id = "org.telegram.desktop"
decoration = "server"
blur = true

# Blur shell-overlay popups (notifications + launcher)
[[window_rules]]
app_id = "swaync-control-center"
blur = true

[[window_rules]]
app_id = "swaync-notification-window"
blur = true

[[window_rules]]
app_id = "launcher"
blur = true

[[window_rules]]
app_id = "Alacritty"
opacity = 0.8
blur = true
